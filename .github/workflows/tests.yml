name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composer:
    name: Composer validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, mbstring, pdo_sqlite, sqlite3, xml, xmlwriter
          coverage: none
          tools: composer:v2

      - name: Locate Composer cache
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-validation-${{ runner.os }}-php-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: composer-validation-${{ runner.os }}-php-8.3-

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install locked dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate development autoloading
        run: composer dump-autoload

  sqlite:
    name: Laravel ${{ matrix.laravel }} / PHP ${{ matrix.php }} / SQLite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '10'
            testbench: '8'
            php: '8.2'
          - laravel: '11'
            testbench: '9'
            php: '8.2'
          - laravel: '12'
            testbench: '10'
            php: '8.2'
          - laravel: '13'
            testbench: '11'
            php: '8.3'
          - laravel: '13'
            testbench: '11'
            php: '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, pdo_sqlite, sqlite3, xml, xmlwriter
          coverage: none
          tools: composer:v2

      - name: Locate Composer cache
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-
            composer-${{ runner.os }}-php-${{ matrix.php }}-

      - name: Allow EOL Laravel compatibility resolution
        if: matrix.laravel == '10' || matrix.laravel == '11'
        run: composer config --global policy.advisories.block false

      - name: Resolve matrix dependencies
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
          TESTBENCH_VERSION: ${{ matrix.testbench }}
        run: |
          rm -f composer.lock
          composer update \
            --with "laravel/framework:^${LARAVEL_VERSION}.0" \
            --with "orchestra/testbench:^${TESTBENCH_VERSION}.0" \
            --with-all-dependencies \
            --prefer-dist \
            --no-interaction \
            --no-progress

      - name: Run SQLite test suite
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: composer test

  mysql:
    name: Laravel 13 / PHP 8.5 / MySQL 8.0
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: inertia_datatables_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, mbstring, pdo_mysql, xml, xmlwriter
          coverage: none
          tools: composer:v2

      - name: Locate Composer cache
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php-8.5-laravel-13-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-php-8.5-laravel-13-

      - name: Resolve Laravel 13 dependencies
        run: |
          rm -f composer.lock
          composer update \
            --with "laravel/framework:^13.0" \
            --with "orchestra/testbench:^11.0" \
            --with-all-dependencies \
            --prefer-dist \
            --no-interaction \
            --no-progress

      - name: Run MySQL test suite
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: inertia_datatables_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: composer test

  postgres:
    name: Laravel 13 / PHP 8.5 / PostgreSQL 16
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inertia_datatables_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready --username=postgres --dbname=inertia_datatables_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, mbstring, pdo_pgsql, xml, xmlwriter
          coverage: none
          tools: composer:v2

      - name: Locate Composer cache
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php-8.5-laravel-13-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-php-8.5-laravel-13-

      - name: Resolve Laravel 13 dependencies
        run: |
          rm -f composer.lock
          composer update \
            --with "laravel/framework:^13.0" \
            --with "orchestra/testbench:^11.0" \
            --with-all-dependencies \
            --prefer-dist \
            --no-interaction \
            --no-progress

      - name: Run PostgreSQL test suite
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: inertia_datatables_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: composer test
